.rh{background:linear-gradient(135deg,#1a2744 0%,#2563a8 100%);color:#fff;padding:14px 18px;border-radius:8px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-end;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.rh-title{font-size:1.15rem;font-weight:800}
.rh-sub{font-size:.72rem;opacity:.75;margin-top:3px}
.rh-meta{text-align:left;font-size:.7rem;opacity:.85;line-height:1.9}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:7px;margin-bottom:16px}
.sc{border:1.5px solid #e2e8f0;border-radius:7px;padding:8px;text-align:center;background:#f8fafd;-webkit-print-color-adjust:exact;print-color-adjust:exact;break-inside:avoid}
.sc-v{font-size:1.5rem;font-weight:800;line-height:1.1}
.sc-k{font-size:.68rem;color:#718096;margin-top:2px}
.sec{font-size:.82rem;font-weight:800;color:#1a2744;padding:5px 11px;background:#eef2f9;border-right:3px solid #2563a8;border-radius:0 5px 5px 0;margin:14px 0 9px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
table{width:100%;border-collapse:collapse;font-size:.72rem;margin-bottom:4px;table-layout:fixed;word-break:break-word}
th{background:#1a2744;color:#fff;padding:6px 8px;text-align:right;font-weight:700;font-size:.69rem;-webkit-print-color-adjust:exact;print-color-adjust:exact}
td{padding:5px 8px;border-bottom:1px solid #edf2f7;vertical-align:top;word-break:break-word;overflow-wrap:break-word}
tr:nth-child(even) td{background:#f7fafc}
.pill{display:inline-block;padding:1px 7px;border-radius:12px;font-size:.68rem;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.bar-bg{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;min-width:40px}
.bar-fg{height:100%;border-radius:3px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.pname{font-size:1rem;font-weight:800;color:#1a2744}
.info-row{display:flex;gap:6px;padding:4px 0;border-bottom:1px solid #f0f4f8;font-size:.75rem}
.ik{font-weight:700;color:#4a5568;min-width:100px;flex-shrink:0}
.iv{color:#1a202c}
.stage-b{border:1px solid #e2e8f0;border-radius:6px;margin-bottom:7px;overflow:hidden;break-inside:avoid}
.stage-h{background:#f7fafc;padding:6px 10px;font-weight:700;font-size:.75rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e2e8f0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.t-row{padding:4px 10px;font-size:.72rem;display:flex;align-items:center;gap:8px;border-bottom:1px solid #fafafa}
.t-row:last-child{border-bottom:none}
.ck{width:11px;height:11px;border:1.5px solid #aaa;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.ck.ok{background:#16a34a;border-color:#16a34a;color:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.fu{padding:6px 10px;margin-bottom:6px;border-radius:0 6px 6px 0;background:#f8faff;font-size:.73rem;break-inside:avoid}
.fu-m{color:#718096;font-size:.68rem;margin-bottom:2px}
.note-e{padding:6px 10px;margin-bottom:6px;border-radius:0 6px 6px 0;background:#fffbeb;font-size:.73rem;break-inside:avoid}
.divider{border:none;border-top:1px dashed #cbd5e0;margin:18px 0}
.foot{margin-top:18px;padding-top:8px;border-top:1px solid #e2e8f0;text-align:center;font-size:.68rem;color:#a0aec0}
.no-print{display:none!important}
.page-break{break-before:page;page-break-before:always}
.no-break{break-inside:avoid;page-break-inside:avoid}
@media print{
  .no-print{display:none!important}
  .page-break{break-before:page;page-break-before:always}
  .no-break{break-inside:avoid}
}
