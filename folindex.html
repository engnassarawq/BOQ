@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;direction:rtl;color:#1a202c;background:#fff;font-size:12.5px;line-height:1.6}
.page{max-width:880px;margin:0 auto;padding:32px 36px}
.rh{background:linear-gradient(135deg,#1a2744 0%,#2563a8 100%);color:#fff;padding:24px 30px;border-radius:10px;margin-bottom:26px;display:flex;justify-content:space-between;align-items:flex-end}
.rh-title{font-size:1.4rem;font-weight:800}
.rh-sub{font-size:.8rem;opacity:.75;margin-top:4px}
.rh-meta{text-align:left;font-size:.78rem;opacity:.85;line-height:2}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:22px}
.sc{border:1.5px solid #e2e8f0;border-radius:9px;padding:12px;text-align:center;background:#f8fafd}
.sc-v{font-size:1.8rem;font-weight:800;line-height:1.1}
.sc-k{font-size:.72rem;color:#718096;margin-top:3px}
.sec{font-size:.93rem;font-weight:800;color:#1a2744;padding:7px 14px;background:#eef2f9;border-right:4px solid #2563a8;border-radius:0 6px 6px 0;margin:20px 0 12px}
table{width:100%;border-collapse:collapse;font-size:.79rem;margin-bottom:4px}
th{background:#1a2744;color:#fff;padding:8px 11px;text-align:right;font-weight:700;font-size:.76rem}
td{padding:6px 11px;border-bottom:1px solid #edf2f7;vertical-align:top}
tr:nth-child(even) td{background:#f7fafc}
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.73rem;font-weight:700}
.bar-bg{height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden;min-width:55px}
.bar-fg{height:100%;border-radius:4px}
.pname{font-size:1.2rem;font-weight:800;color:#1a2744}
.info-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f0f4f8;font-size:.81rem}
.ik{font-weight:700;color:#4a5568;min-width:115px;flex-shrink:0}
.iv{color:#1a202c}
.stage-b{border:1px solid #e2e8f0;border-radius:7px;margin-bottom:8px;overflow:hidden}
.stage-h{background:#f7fafc;padding:7px 13px;font-weight:700;font-size:.8rem;display:flex;justify-content:space-between;border-bottom:1px solid #e2e8f0}
.t-row{padding:5px 13px;font-size:.78rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid #fafafa}
.t-row:last-child{border-bottom:none}
.ck{width:13px;height:13px;border:1.5px solid #aaa;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.ck.ok{background:#16a34a;border-color:#16a34a;color:#fff}
.fu{padding:8px 12px;margin-bottom:7px;border-radius:0 7px 7px 0;background:#f8faff;font-size:.79rem}
.fu-m{color:#718096;font-size:.73rem;margin-bottom:3px}
.note-e{padding:8px 12px;margin-bottom:7px;border-radius:0 7px 7px 0;background:#fdf9ff;font-size:.79rem}
.divider{border:none;border-top:1.5px dashed #cbd5e0;margin:28px 0}
.foot{margin-top:28px;padding-top:10px;border-top:1px solid #e2e8f0;text-align:center;font-size:.72rem;color:#a0aec0}
@media print{
  body{font-size:11px}
  .page{padding:14px 18px}
  .no-print{display:none!important}
  .rh,.sc{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  th,.pill,.bar-fg,.ck.ok{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .page-break{page-break-after:always}
