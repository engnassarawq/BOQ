<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

<body class="bg-slate-50 min-h-screen text-slate-800">

        </header>

        <div id="tabMasterContent">

                    <form id="itemForm" onsubmit="saveMasterItem(event)" class="space-y-5">
                        <input type="hidden" id="itemId">

                        <div><label class="block text-xs font-bold text-slate-500 mb-2">الصياغة الفنية</label><textarea id="itemDescription" rows="5" class="w-full p-3 bg-slate-50 border rounded-xl text-sm" placeholder="اكتب وصف البند..." required></textarea></div>

                </div>

                    </div>
                    <div id="itemsContainer" class="space-y-4"></div>

            </div>
        </div>

            </div>
        </div>
        
        <div id="tabPricingContent" class="hidden space-y-6"></div>

        const masterCategoriesData = ["أعمال الكهرباء", "أعمال الصوتيات", "أنظمة إنذار وإطفاء الحريق", "كاميرات ونظم أمنية", "إنارة (Lighting)", "قوى ومآخذ (Power)", "كابلات ومسارات (Cables)", "لوحات توزيع (Panels)", "تأريض وحماية (Earthing)", "تيار خفيف (Low Current)"];
        
        let items = [], categories = [], allProjects = [], trash = [], currentProjectId = null, adminPassword = '1234', isAdminAuthenticated = false;

        document.addEventListener("DOMContentLoaded", () => {
            loadDataFromStorage();
            populateCategoryDropdowns();
            if (currentProjectId && allProjects.some(p => p.projectId === currentProjectId)) {
                document.getElementById('tabPricingBtn').classList.remove('hidden');
                switchTab('pricing');
            } else {
                switchTab('projects');
            }
        });

        function loadDataFromStorage() {
            let storedItems = localStorage.getItem("electrical_boq_items");
            if (storedItems) {
                items = JSON.parse(storedItems);
                categories = JSON.parse(localStorage.getItem("electrical_boq_categories"));
            } else {
                items = masterItemsData;
                categories = masterCategoriesData;
                localStorage.setItem("electrical_boq_items", JSON.stringify(items));
                localStorage.setItem("electrical_boq_categories", JSON.stringify(categories));
            }
            allProjects = JSON.parse(localStorage.getItem("electrical_boq_all_projects")) || [];
            trash = JSON.parse(localStorage.getItem("electrical_boq_trash")) || [];
            currentProjectId = JSON.parse(localStorage.getItem("electrical_boq_current_project_id")) || null;
            adminPassword = localStorage.getItem("electrical_boq_pass") || "1234";
            updateAllCounts();
        }

        function updateAllCounts() {
            document.getElementById("masterCount").innerText = items.length;
            document.getElementById("projectsCount").innerText = allProjects.length;
        }

        function switchTab(tabId) {
            ["master", "projects", "pricing"].forEach(id => {
                const content = document.getElementById(`tab${capitalize(id)}Content`);
                const btn = document.getElementById(`tab${capitalize(id)}Btn`);
                if (content) content.classList.add('hidden');
                if (btn) { btn.classList.remove('tab-btn-active'); btn.classList.add('tab-btn-inactive'); }
            });
            if (tabId === 'pricing' && !currentProjectId) return switchTab('projects');
            
            const activeBtn = document.getElementById(`tab${capitalize(tabId)}Btn`);
            const activeContent = document.getElementById(`tab${capitalize(tabId)}Content`);
            if(activeBtn) { activeBtn.classList.add('tab-btn-active'); activeBtn.classList.remove('tab-btn-inactive'); }
            if(activeContent) activeContent.classList.remove('hidden');

            if (tabId === 'master') renderMasterItems();
            if (tabId === 'projects') renderProjectsList();
            if (tabId === 'pricing') renderPricingPage();
        }

        function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

        function populateCategoryDropdowns() {
            ['itemCategory', 'filterCategory'].forEach(id => {
                const select = document.getElementById(id);
                const currentVal = select.value;
                select.innerHTML = (id === 'filterCategory' ? '<option value="كل الأقسام">كل الأقسام</option>' : '') + 
                                   categories.map(cat => `<option value="${escapeHTML(cat)}">${escapeHTML(cat)}</option>`).join('');
                if (categories.includes(currentVal)) select.value = currentVal;
            });
        }

        function renderMasterItems() {
            const query = document.getElementById('searchQuery').value.toLowerCase();
            const filter = document.getElementById('filterCategory').value;
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';
            const canAddToProject = currentProjectId !== null;

            const filtered = items.filter(item => {
                const matchesQuery = (item.description || '').toLowerCase().includes(query) || (item.category || '').toLowerCase().includes(query);
                const matchesFilter = filter === 'كل الأقسام' || item.category === filter;
                return matchesQuery && matchesFilter;
            }).sort((a,b) => a.description.localeCompare(b.description));
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="bg-white p-12 text-center text-slate-400 rounded-3xl border-dashed border-2"><span>📁</span><p>لا توجد بنود تطابق بحثك.</p></div>`;
                return;
            }
            
            let projectItemsIds = [];
            if (canAddToProject) {
                const project = allProjects.find(p => p.projectId === currentProjectId);
                if (project) projectItemsIds = project.items.map(pi => pi.id);
            }
            
            filtered.forEach(item => {
                const isInProject = canAddToProject && projectItemsIds.includes(item.id);
                const card = document.createElement("div");
                card.className = "bg-white p-6 rounded-3xl shadow-sm border hover:border-indigo-200 transition-all group";
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-4">
                        <span class="inline-block bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1.5 rounded-full">${escapeHTML(item.category)}</span>
                        <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition-all">
                            <button onclick="editItem(${item.id})" class="text-xs font-bold text-indigo-600 hover:underline">✏️ تعديل</button>
                            <button onclick="deleteItem(${item.id})" class="text-xs font-bold text-red-500 hover:underline">🗑️ حذف</button>
                        </div>
                    </div>
                    <div class="text-sm font-semibold mt-4 text-slate-800 leading-relaxed">${item.description.replace(/\n/g, '<br>')}</div>
                    <div class="mt-5 pt-4 border-t flex justify-between items-center">
                        <div class="text-xs text-slate-500"><span>السعر: <strong class="text-indigo-600">${item.price.toFixed(2)} ر.ق</strong></span></div>
                        <button onclick="openItemEditorForProject(${item.id}, false)" ${!canAddToProject || isInProject ? "disabled" : ""} class="px-4 py-2 rounded-xl text-xs font-bold transition-all ${canAddToProject ? (isInProject ? "bg-emerald-50 text-emerald-700 cursor-default" : "bg-indigo-900 hover:bg-black text-white") : "bg-slate-200 text-slate-400 cursor-not-allowed"}">
                            ${canAddToProject ? (isInProject ? "✔️ مضاف" : "➕ إضافة وتخصيص") : "حمّل مشروعاً"}
                        </button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function saveMasterItem(event) {
            event.preventDefault();
            const id = document.getElementById("itemId").value;
            const newItemData = {
                category: document.getElementById("itemCategory").value,
                description: document.getElementById("itemDescription").value,
                unit: document.getElementById("itemUnit").value,
                price: parseFloat(document.getElementById("itemPrice").value)
            };
            if (id) {
                const index = items.findIndex(item => item.id == id);
                if (index !== -1) items[index] = { id: Number(id), ...newItemData };
            } else {
                items.push({ id: Date.now(), ...newItemData });
            }
            localStorage.setItem("electrical_boq_items", JSON.stringify(items));
            updateAllCounts();
            resetForm();
            renderMasterItems();
        }

        function editItem(id) {
            const item = items.find(i => i.id == id);
            if (item) {
                document.getElementById("itemId").value = item.id;
                document.getElementById("itemCategory").value = item.category;
                document.getElementById("itemDescription").value = item.description.replace(/<br>/g, "\n");
                document.getElementById("itemUnit").value = item.unit;
                document.getElementById("itemPrice").value = item.price;
                document.getElementById("formTitle").innerHTML = "✏️ تعديل البند المرجعي";
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        }

                if (!newName) return alert("الاسم فارغ.");
                
                let newArea = prompt("تعديل المنطقة:", project.projectArea);
                if (newArea === null) return; newArea = newArea.trim();
                if (!newArea) return alert("المنطقة فارغة.");
                
                project.projectName = newName;

            allProjects.unshift(newProject);
            localStorage.setItem("electrical_boq_all_projects", JSON.stringify(allProjects));

            document.getElementById('tabPricingBtn').classList.remove('hidden');

        function deleteProject(projectId) {
            const projectIndex = allProjects.findIndex(p => p.projectId === projectId);

                if (confirm(`هل أنت متأكد من حذف مشروع "${allProjects[projectIndex].projectName}"؟ سينتقل إلى سلة المحذوفات.`)) {
                    const [deletedProject] = allProjects.splice(projectIndex, 1);
                    trash.unshift(deletedProject);
                    localStorage.setItem("electrical_boq_all_projects", JSON.stringify(allProjects));
                    localStorage.setItem("electrical_boq_trash", JSON.stringify(trash));

        function updateProjectItemQuantity(id, value) {
            const quantity = parseFloat(value);
            if (isNaN(quantity) || quantity < 0) return;
            const projIndex = allProjects.findIndex(p => p.projectId === currentProjectId);
            if (projIndex > -1) {

                    allProjects[projIndex].items[itemIndex].quantity = quantity;
                    localStorage.setItem("electrical_boq_all_projects", JSON.stringify(allProjects));
                    renderPricingPage();
                }
            }
        }

                renderPricingPage();
                renderMasterItems();
            }
        }

        function restoreProject(id) { let idx = trash.findIndex(p => p.projectId === id); if (idx > -1) { const [restored] = trash.splice(idx, 1); allProjects.unshift(restored); localStorage.setItem("electrical_boq_all_projects", JSON.stringify(allProjects)); localStorage.setItem("electrical_boq_trash", JSON.stringify(trash)); renderTrash(); renderProjectsList(); updateAllCounts(); renderMasterItems(); alert(`تم استعادة مشروع "${restored.projectName}"!`); } }

        function exportData() { const data = { items, categories, allProjects, trash, password: adminPassword }; const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `BOQ_Backup_${new Date().toISOString().split("T")[0]}.json`; a.click(); URL.revokeObjectURL(url); }
        function importData(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { try { const data = JSON.parse(e.target.result); if (!data || !Array.isArray(data.items) || !Array.isArray(data.categories) || !Array.isArray(data.allProjects)) throw new Error("ملف غير صالح."); if (confirm("سيتم استبدال جميع البيانات الحالية. متابعة؟")) { items = data.items; categories = data.categories; allProjects = data.allProjects; trash = data.trash || []; adminPassword = data.password || "1234"; localStorage.setItem("electrical_boq_items", JSON.stringify(items)); localStorage.setItem("electrical_boq_categories", JSON.stringify(categories)); localStorage.setItem("electrical_boq_all_projects", JSON.stringify(allProjects)); localStorage.setItem("electrical_boq_trash", JSON.stringify(trash)); localStorage.setItem("electrical_boq_pass", adminPassword); loadDataFromStorage(); populateCategoryDropdowns(); switchTab("master"); alert("تم الاستيراد بنجاح!"); } } catch (err) { alert(`فشل الاستيراد: ${err.message}`); } finally { event.target.value = ""; } }; reader.readAsText(file); }
        function escapeHTML(str) { return String(str).replace(/[&<>"']/g, s => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[s])); }

        function execEditorCommand(command, value = null) { document.execCommand(command, false, value); document.getElementById("editorArea").focus(); }
        function closeEditorModal() { document.getElementById("editorModalContainer").innerHTML = ""; }
        function confirmItemEdit(itemId, isEdit) {
            const projectIndex = allProjects.findIndex(p => p.projectId === currentProjectId);
            if (projectIndex === -1) return alert("لا يوجد مشروع نشط.");
            const newDescriptionHtml = document.getElementById("editorArea").innerHTML.trim();
            if (!newDescriptionHtml) return alert("الوصف فارغ.");
            if (isEdit) {
                const itemIndex = allProjects[projectIndex].items.findIndex(i => i.id === itemId);
                if (itemIndex !== -1) allProjects[projectIndex].items[itemIndex].description = newDescriptionHtml;
            } else {
                const originalItem = items.find(i => i.id === itemId);
                if (originalItem) {
                    allProjects[projectIndex].items.push({ ...originalItem, description: newDescriptionHtml, quantity: 1 });
                }
            }
            localStorage.setItem("electrical_boq_all_projects", JSON.stringify(allProjects));
            closeEditorModal();
            renderPricingPage();
            renderMasterItems();
        }

        // --- NEW & ROBUST Excel Export Function using ExcelJS ---
        async function exportProjectToStyledExcel() {
            try {
                const project = allProjects.find(p => p.projectId === currentProjectId);
                if (!project || project.items.length === 0) {
                    alert("لا توجد بنود في المشروع لتصديرها!");
                    return;
                }

                const workbook = new ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet('جدول الكميات', {
                    pageSetup: { paperSize: 9, orientation: 'landscape' },
                    views: [{ rightToLeft: true }]
                });

                // --- STYLES CONFIG (excel.json equivalent) ---
                const excelStyles = {
                    generalFont: { name: 'Arial', size: 10 },
                    headerFill: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF002060' } },
                    headerFont: { name: 'Arial', size: 11, bold: true, color: { argb: 'FFFFFFFF' } },
                    categoryFill: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF8EA9DB' } },
                    categoryFont: { name: 'Arial', size: 11, bold: true },
                    border: { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } },
                    centerAlign: { vertical: 'middle', horizontal: 'center', wrapText: true },
                    rightAlign: { vertical: 'middle', horizontal: 'right', wrapText: true },
                    totalFont: { name: 'Arial', size: 11, bold: true }
                };

                // --- Set Column Widths ---
                worksheet.columns = [
                    { key: 'total', width: 15 }, { key: 'price', width: 15 },
                    { key: 'qty', width: 10 }, { key: 'unit', width: 12 },
                    { key: 'desc', width: 80 }, { key: 'no', width: 8 }
                ];
                
                // --- HEADER ROWS ---
                worksheet.mergeCells('A1:F1');
                const titleCell = worksheet.getCell('A1');
                titleCell.value = "بنود اعمال الصيانة الشاملة";
                titleCell.font = { name: 'Arial', size: 16, bold: true };
                titleCell.alignment = { horizontal: 'center' };

                worksheet.mergeCells('D2:F2');
                worksheet.getCell('D2').value = `اسم المشروع: ${project.projectName || ""}`;
                worksheet.mergeCells('D3:F3');
                worksheet.getCell('D3').value = `موقع المشروع: ${project.projectArea || ""}`;
                
                worksheet.mergeCells('A5:F5');
                worksheet.getCell('A5').value = "ملحوظة هامة: جميع البنود تشمل ومحمل عليها إزالة كل ما يعيق ويتعارض مع تنفيذ الأعمال، وإعادة ترميم وتشغيل الأجزاء والأجهزة المتأثرة بالأعمال ورد الشيء لأصله.";
                worksheet.getCell('A5').alignment = { wrapText: true };
                
                const headerRow = worksheet.addRow(["الجملة", "الفئة", "الكمية", "الوحدة", "بيــان الأعمــال", "م"]);
                headerRow.eachCell(cell => {
                    cell.fill = excelStyles.headerFill;
                    cell.font = excelStyles.headerFont;
                    cell.alignment = excelStyles.centerAlign;
                    cell.border = excelStyles.border;
                });

                // --- DATA ROWS ---
                const groupedItems = project.items.reduce((acc, item) => {
                    (acc[item.category] = acc[item.category] || []).push(item);
                    return acc;
                }, {});

                let itemCounter = 1;
                let grandTotal = 0;

                for (const category in groupedItems) {
                    const categoryRow = worksheet.addRow([null, null, null, null, `أعمال ${category}`]);
                    worksheet.mergeCells(categoryRow.number, 1, categoryRow.number, 5);
                    const categoryCell = categoryRow.getCell(5);
                    categoryCell.fill = excelStyles.categoryFill;
                    categoryCell.font = excelStyles.categoryFont;
                    categoryCell.alignment = { vertical: 'middle', horizontal: 'right' };
                    categoryCell.border = excelStyles.border;
                    categoryRow.getCell(6).border = excelStyles.border;


                    groupedItems[category].forEach(item => {
                        const cleanDescription = (item.description || "").replace(/<[^>]*>/g, " ").replace(/&nbsp;/g, ' ').trim();
                        const itemTotal = (item.price || 0) * (item.quantity || 0);
                        grandTotal += itemTotal;
                        
                        const itemRow = worksheet.addRow([
                            itemTotal, item.price, item.quantity,
                            item.unit, cleanDescription, itemCounter++
                        ]);

                        itemRow.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                            cell.font = excelStyles.generalFont;
                            cell.border = excelStyles.border;
                             // Apply wrap text to description
                            if (colNumber === 5) {
                                cell.alignment = excelStyles.rightAlign;
                            } else {
                                cell.alignment = excelStyles.centerAlign;
                            }
                        });
                        itemRow.getCell(1).numFmt = '#,##0.00';
                        itemRow.getCell(2).numFmt = '#,##0.00';
                    });
                }
                
                // --- FOOTER ROW ---
                const totalRow = worksheet.addRow([grandTotal, null, null, null, "الإجمالي الكلي (ر.ق):"]);
                totalRow.getCell(1).numFmt = '#,##0.00';
                totalRow.getCell(1).font = excelStyles.totalFont;
                totalRow.getCell(5).font = excelStyles.totalFont;
                totalRow.getCell(1).alignment = {horizontal: 'right'};
                totalRow.getCell(5).alignment = {horizontal: 'right'};

                // --- SAVE FILE ---
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `جدول كميات - ${project.projectName}.xlsx`;
                link.click();
                URL.revokeObjectURL(link.href);

            } catch (error) {
                console.error("Failed to export Excel file:", error);
                alert("حدث خطأ أثناء محاولة تصدير الملف. يرجى مراجعة الكونسول لمزيد من التفاصيل.");
            }
        }

    </script>
</body>
</html>
