@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;direction:rtl;color:#1a202c;background:#fff;font-size:12.5px;line-height:1.6}
.page{max-width:860px;margin:0 auto;padding:32px 36px}

/* ─ رأس التقرير ─ */
.rh{background:linear-gradient(135deg,#1a2744 0%,#2563a8 100%);color:#fff;padding:24px 30px;border-radius:10px;margin-bottom:26px;display:flex;justify-content:space-between;align-items:flex-end}
.rh-title{font-size:1.4rem;font-weight:800;letter-spacing:.3px}
.rh-sub{font-size:.8rem;opacity:.75;margin-top:4px}
.rh-meta{text-align:left;font-size:.78rem;opacity:.85;line-height:2}

/* ─ بطاقات ─ */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.sc{border:1.5px solid #e2e8f0;border-radius:9px;padding:13px;text-align:center;background:#f8fafd}
.sc-v{font-size:2rem;font-weight:800;color:#1a2744;line-height:1.1}
.sc-k{font-size:.73rem;color:#718096;margin-top:3px}

/* ─ عناوين الأقسام ─ */
.sec{font-size:.95rem;font-weight:800;color:#1a2744;padding:7px 14px;background:#eef2f9;border-right:4px solid #2563a8;border-radius:0 6px 6px 0;margin:20px 0 12px}

/* ─ جداول ─ */
table{width:100%;border-collapse:collapse;font-size:.8rem;margin-bottom:4px}
th{background:#1a2744;color:#fff;padding:9px 13px;text-align:right;font-weight:700;font-size:.78rem}
td{padding:7px 13px;border-bottom:1px solid #edf2f7;vertical-align:top}
tr:nth-child(even) td{background:#f7fafc}
.pill{display:inline-block;padding:2px 11px;border-radius:20px;font-size:.74rem;font-weight:700}
.bar-bg{height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden;min-width:60px}
.bar-fg{height:100%;border-radius:4px}

/* ─ بطاقة مشروع واحد ─ */
.pname{font-size:1.25rem;font-weight:800;color:#1a2744}
.pnum{font-size:.8rem;color:#888;margin-top:2px}
.info-2col{display:grid;grid-template-columns:1fr 1fr;gap:0 28px}
.info-row{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f0f4f8;font-size:.82rem}
.ik{font-weight:700;color:#4a5568;min-width:120px;flex-shrink:0}
.iv{color:#1a202c}

/* ─ مراحل ─ */
.stage-b{border:1px solid #e2e8f0;border-radius:7px;margin-bottom:8px;overflow:hidden}
.stage-h{background:#f7fafc;padding:8px 14px;font-weight:700;font-size:.82rem;display:flex;justify-content:space-between;border-bottom:1px solid #e2e8f0}
.t-row{padding:5px 14px;font-size:.79rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid #fafafa}
.t-row:last-child{border-bottom:none}
.ck{width:13px;height:13px;border:1.5px solid #aaa;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.ck.ok{background:#16a34a;border-color:#16a34a;color:#fff}

/* ─ متابعات ─ */
.fu{padding:9px 13px;margin-bottom:7px;border-radius:0 7px 7px 0;background:#f8faff;font-size:.8rem}
.fu-m{color:#718096;font-size:.74rem;margin-bottom:3px}
.note-e{padding:9px 13px;margin-bottom:7px;border-radius:0 7px 7px 0;background:#fdf9ff;font-size:.8rem}

/* ─ فاصل ─ */
.divider{border:none;border-top:1.5px dashed #cbd5e0;margin:28px 0}

/* ─ تذييل ─ */
.foot{margin-top:30px;padding-top:12px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:#a0aec0}
.foot-brand{font-weight:700;color:#2563a8}

@media print{
  body{font-size:11.5px}
  .page{padding:16px 20px}
  .no-print{display:none!important}
  .rh,.sc{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .page-break{page-break-after:always}
  .no-break{page-break-inside:avoid}
}
