table{width:100%;border-collapse:collapse;font-size:.72rem;margin-bottom:4px;table-layout:fixed;word-break:break-word}

.pill{display:inline-block;padding:1px 7px;border-radius:12px;font-size:.68rem;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.bar-bg{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;min-width:40px}

.pname{font-size:1rem;font-weight:800;color:#1a2744}

.fu{padding:6px 10px;margin-bottom:6px;border-radius:0 6px 6px 0;background:#f8faff;font-size:.73rem;break-inside:avoid}
.fu-m{color:#718096;font-size:.68rem;margin-bottom:2px}
.note-e{padding:6px 10px;margin-bottom:6px;border-radius:0 6px 6px 0;background:#fffbeb;font-size:.73rem;break-inside:avoid}
.divider{border:none;border-top:1px dashed #cbd5e0;margin:18px 0}
.foot{margin-top:18px;padding-top:8px;border-top:1px solid #e2e8f0;text-align:center;font-size:.68rem;color:#a0aec0}
.no-print{display:none!important}
.page-break{break-before:page;page-break-before:always}
.no-break{break-inside:avoid;page-break-inside:avoid}
@media print{
